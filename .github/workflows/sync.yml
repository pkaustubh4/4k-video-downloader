name: Sync to Hugging Face Hub

on:
  push:
    branches: [main]
  workflow_dispatch: # This allows you to manually trigger it to test!

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Sync to Hugging Face
        uses: huggingface/hub-sync@v0.1.0
        with:
          github_repo_id: ${{ github.repository }}
          huggingface_repo_id: pkaustubh4/4k-video-downloader
          hf_token: ${{ secrets.HF_TOKEN }}
